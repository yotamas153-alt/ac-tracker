<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#070b16">
  <title>❄️ AC Tracker — ניהול מזגנים</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="app-header">
    <div class="app-header__title">
      <span class="app-header__logo">❄️</span>
      <div>
        <h1>AC Tracker</h1>
        <p>ניהול מזגנים</p>
      </div>
    </div>
    <div id="syncStatus" class="sync-badge" title="מצב חיבור"><i></i><span>···</span></div>
  </header>

  <div id="greeting" class="greeting"></div>

  <main id="app" class="app-main">

    <section id="view-search" class="view is-active">
      <div id="upcomingCard" class="upcoming"></div>
      <div class="search-bar">
        <div class="search-field">
          <span class="search-field__icon">🔍</span>
          <input id="search" type="search" inputmode="text" placeholder="סרוק או הקלד ברקוד / מבנה / מיקום">
        </div>
        <button id="btnScan" class="btn btn--scan" title="סרוק ברקוד">📷</button>
      </div>

      <div id="teamUpdates" class="team">
        <div class="team__head">
          <span>💬 עדכוני צוות</span>
          <button id="teamAdd" class="team__add" title="עדכון חדש">＋</button>
        </div>
        <div id="teamList" class="team__list"></div>
      </div>

      <div id="searchResults" class="results"></div>
    </section>

    <section id="view-buildings" class="view">
